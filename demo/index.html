<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Propostas com IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f0f13; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { background: #18181f; border: 1px solid #2a2a35; border-radius: 12px; }
    .card-selected { border-color: #6366f1; background: rgba(99,102,241,0.05); box-shadow: 0 0 0 1px #6366f1; }
    .badge { background: #6366f1; color: white; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-primary { background: #6366f1; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
    .btn-primary:hover { background: #5254cc; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline { background: transparent; color: #9ca3af; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; }
    .btn-outline:hover { border-color: #6366f1; color: #e5e7eb; }
    .btn-small { background: transparent; border: 1px solid #2a2a35; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #9ca3af; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s; }
    .btn-small:hover { border-color: #6366f1; color: #e5e7eb; }
    .input { background: #0f0f13; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px 14px; color: #e5e7eb; font-size: 14px; width: 100%; box-sizing: border-box; outline: none; transition: border-color 0.15s; }
    .input:focus { border-color: #6366f1; }
    .tab { padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; color: #9ca3af; transition: all 0.15s; border: none; background: transparent; }
    .tab.active { background: #18181f; color: #e5e7eb; }
    .tab-bar { background: #0f0f13; border: 1px solid #2a2a35; border-radius: 8px; padding: 3px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
    .tag { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #9ca3af; }
    .check { color: #6366f1; }
    .step { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .spinner { width: 16px; height: 16px; border: 2px solid #6366f1; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    pre { white-space: pre-wrap; font-family: inherit; font-size: 13px; line-height: 1.7; }
    .copy-success { color: #22c55e !important; }
    textarea { resize: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const DEMO = {
      escopos: [
        {
          nome: 'Essencial',
          descricao: 'Gestão de redes sociais com foco em engajamento orgânico.',
          entregaveis: ['12 posts/mês (feed + stories)', 'Copywriting para Instagram e Facebook', 'Relatório mensal de desempenho'],
          prazo: '30 dias úteis',
          investimento: 'R$ 1.800',
          destaque: false,
        },
        {
          nome: 'Profissional',
          descricao: 'Estratégia completa de marketing digital com gestão de tráfego e conteúdo.',
          entregaveis: ['20 posts/mês (feed + stories)', 'Gestão de Meta Ads (tráfego pago)', '2 peças gráficas por semana', 'Reunião quinzenal de alinhamento', 'Relatório detalhado com insights'],
          prazo: '45 dias úteis',
          investimento: 'R$ 3.500',
          destaque: true,
        },
        {
          nome: 'Premium',
          descricao: 'Presença digital completa com estratégia omnichannel e vídeos.',
          entregaveis: ['30 posts/mês em todas as redes', 'Meta Ads + Google Ads', '4 Reels/mês (produção inclusa)', 'Landing page otimizada', 'Email marketing mensal', 'Dashboard de resultados em tempo real'],
          prazo: '60 dias úteis',
          investimento: 'R$ 6.800',
          destaque: false,
        },
      ],
      proposta: `# Proposta Comercial — Marketing Digital
Preparada para: Padaria do João
Data: ${new Date().toLocaleDateString('pt-BR')} | Validade: 15 dias

---

## Apresentação

A [Sua Agência] transforma negócios locais em referências digitais. Nosso trabalho vai além de "postar nas redes" — criamos um ecossistema digital que atrai, engaja e converte clientes.

## Entendimento do Desafio

A Padaria do João busca aumentar sua visibilidade online para atrair novos clientes e fidelizar os atuais, num mercado onde a concorrência digital no setor alimentício cresce todo mês.

## Solução Proposta — Escopo Profissional

Estratégia completa combinando conteúdo orgânico de alta qualidade com tráfego pago segmentado para o público local.

## Metodologia

1. Diagnóstico (semana 1): Análise do perfil atual, benchmarking e definição de personas
2. Estratégia (semana 2): Calendário editorial, tom de voz e identidade visual digital
3. Execução (semanas 3–8): Produção de conteúdo + gestão das campanhas
4. Otimização (contínuo): Análise semanal de métricas e ajustes táticos

## Entregáveis

✓ 20 posts/mês (feed + stories)
✓ Gestão de Meta Ads com budget gerenciado
✓ 2 peças gráficas por semana
✓ Reunião quinzenal de alinhamento estratégico
✓ Relatório detalhado mensal com insights

## Investimento e Condições

Investimento mensal: R$ 3.500,00
Forma de pagamento: Boleto ou PIX até dia 5 de cada mês
Fidelidade: Contrato mínimo de 3 meses
Início: Em até 7 dias úteis após assinatura`,
      objecoes: [
        {
          objecao: 'O investimento está alto para uma padaria',
          resposta: 'Entendo. Para contextualizar: se atrairmos apenas 2 novos clientes fixos por semana com ticket médio de R$ 50, isso representa R$ 400/mês — o retorno acontece com menos de 10 novos clientes regulares. Além disso, temos o escopo Essencial a R$ 1.800 como ponto de entrada.',
        },
        {
          objecao: 'Já tentei agência antes e não funcionou',
          resposta: 'Justo trazer isso. A diferença está na nossa metodologia: metas claras definidas no início, relatórios quinzenais de transparência e reuniões de alinhamento para garantir que estamos no caminho certo. Você acompanha cada resultado em tempo real.',
        },
        {
          objecao: 'Preciso pensar e ver com meu sócio',
          resposta: 'Claro, faz todo sentido envolver quem decide. Posso preparar um resumo executivo de 1 página para facilitar a conversa com seu sócio, ou agendar uma reunião rápida de 20 minutos com vocês dois. Qual opção funciona melhor?',
        },
      ],
      mensagem: `Olá, João! Tudo bem?

Conforme combinamos, estou enviando nossa proposta comercial para a Padaria do João.

Preparei 3 opções de escopo pensando especificamente na realidade do seu negócio — desde um ponto de entrada mais acessível até uma estratégia completa para você dominar o digital na sua região.

Minha recomendação pessoal é o escopo Profissional, que combina o melhor custo-benefício e costuma gerar resultados visíveis já no primeiro mês.

Fico à disposição para tirar qualquer dúvida ou ajustar algo. Podemos conversar ainda essa semana?

Abraço,
[Seu Nome]
[Seu WhatsApp]`,
    };

    const STEPS = [
      'Analisando seu serviço e contexto...',
      'Pesquisando práticas de mercado...',
      'Calculando investimentos sugeridos...',
      'Redigindo proposta profissional...',
      'Preparando respostas para objeções...',
    ];

    function App() {
      const [state, setState] = useState('idle');
      const [step, setStep] = useState(0);
      const [servico, setServico] = useState('');
      const [cliente, setCliente] = useState('');
      const [segmento, setSegmento] = useState('');
      const [contexto, setContexto] = useState('');
      const [escopoIdx, setEscopoIdx] = useState(1);
      const [tab, setTab] = useState('proposta');
      const [copied, setCopied] = useState(null);

      const showDemo = () => {
        setState('result');
        setEscopoIdx(1);
      };

      const simularGeracao = () => {
        if (!servico.trim() || !cliente.trim()) return;
        setState('loading');
        setStep(0);
        let s = 0;
        const iv = setInterval(() => {
          s++;
          if (s < STEPS.length) setStep(s);
          else { clearInterval(iv); setState('result'); setEscopoIdx(1); }
        }, 1000);
      };

      const copy = (text, key) => {
        navigator.clipboard.writeText(text).catch(() => {});
        setCopied(key);
        setTimeout(() => setCopied(null), 2000);
      };

      if (state === 'loading') return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:40,padding:24}}>
          <div style={{textAlign:'center'}}>
            <div style={{width:56,height:56,background:'rgba(99,102,241,0.1)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:28}}>✨</div>
            <h2 style={{fontSize:20,fontWeight:700,margin:'0 0 4px'}}>Gerando sua proposta...</h2>
            <p style={{color:'#9ca3af',fontSize:14,margin:0}}>Isso leva alguns segundos</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:300}}>
            {STEPS.map((s, i) => (
              <div key={i} className="step" style={{color: i < step ? '#6366f1' : i === step ? '#e5e7eb' : '#374151'}}>
                {i < step ? <span style={{color:'#6366f1',fontSize:16}}>✓</span>
                 : i === step ? <div className="spinner" />
                 : <span style={{width:16,height:16,borderRadius:'50%',border:'1.5px solid #374151',display:'inline-block',flexShrink:0}} />}
                {s}
              </div>
            ))}
          </div>
        </div>
      );

      if (state === 'result') {
        const escopo = DEMO.escopos[escopoIdx];
        return (
          <div style={{maxWidth:800,margin:'0 auto',padding:'24px 16px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:700,margin:'0 0 4px'}}>Proposta gerada com sucesso</h2>
                <p style={{color:'#9ca3af',fontSize:13,margin:0}}>Selecione o escopo e copie sua proposta</p>
              </div>
              <button className="btn-small" onClick={() => setState('idle')}>↩ Nova</button>
            </div>

            {/* Scope cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
              {DEMO.escopos.map((e, i) => (
                <div key={i} className={`card ${escopoIdx === i ? 'card-selected' : ''}`}
                  style={{padding:'16px 14px',cursor:'pointer',position:'relative',transition:'all 0.15s'}}
                  onClick={() => setEscopoIdx(i)}>
                  {e.destaque && (
                    <div style={{position:'absolute',top:-10,left:'50%',transform:'translateX(-50%)'}}>
                      <span className="badge">Recomendado</span>
                    </div>
                  )}
                  <p style={{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.1em',margin:'4px 0 4px'}}>{e.nome}</p>
                  <p style={{fontSize:22,fontWeight:700,margin:'0 0 4px'}}>{e.investimento}</p>
                  <p style={{fontSize:12,color:'#9ca3af',margin:'0 0 10px'}}>⏱ {e.prazo}</p>
                  <ul style={{listStyle:'none',padding:0,margin:0,display:'flex',flexDirection:'column',gap:5}}>
                    {e.entregaveis.slice(0,4).map((item, j) => (
                      <li key={j} style={{fontSize:12,color:'#9ca3af',display:'flex',alignItems:'flex-start',gap:5}}>
                        <span className="check" style={{flexShrink:0,marginTop:1}}>✓</span>{item}
                      </li>
                    ))}
                    {e.entregaveis.length > 4 && <li style={{fontSize:12,color:'#6366f1',fontWeight:500}}>+{e.entregaveis.length - 4} entregáveis</li>}
                  </ul>
                </div>
              ))}
            </div>

            {/* Tabs */}
            <div className="tab-bar" style={{marginBottom:16}}>
              {[['proposta','📄 Proposta'],['objecoes','⚡ Objeções (3)'],['mensagem','✉️ Mensagem']].map(([key,label]) => (
                <button key={key} className={`tab ${tab === key ? 'active' : ''}`} onClick={() => setTab(key)}>{label}</button>
              ))}
            </div>

            {tab === 'proposta' && (
              <div className="card" style={{padding:20}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
                  <span style={{fontSize:13,fontWeight:600}}>Escopo {escopo.nome} — {escopo.investimento}</span>
                  <button className="btn-small" onClick={() => copy(DEMO.proposta, 'proposta')}
                    style={copied === 'proposta' ? {borderColor:'#22c55e',color:'#22c55e'} : {}}>
                    {copied === 'proposta' ? '✓ Copiado!' : '⎘ Copiar'}
                  </button>
                </div>
                <div style={{background:'rgba(255,255,255,0.03)',borderRadius:8,border:'1px solid #2a2a35',padding:'14px 16px',maxHeight:440,overflowY:'auto'}}>
                  <pre style={{color:'#d1d5db'}}>{DEMO.proposta}</pre>
                </div>
              </div>
            )}

            {tab === 'objecoes' && (
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {DEMO.objecoes.map((obj, i) => (
                  <div key={i} className="card" style={{padding:16}}>
                    <div style={{display:'flex',gap:12}}>
                      <div style={{width:26,height:26,borderRadius:'50%',background:'rgba(239,68,68,0.1)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2,fontSize:13}}>⚡</div>
                      <div style={{flex:1}}>
                        <p style={{fontSize:14,fontWeight:600,margin:'0 0 8px'}}>"{obj.objecao}"</p>
                        <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                          <div style={{width:20,height:20,borderRadius:'50%',background:'rgba(99,102,241,0.1)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1,fontSize:11,color:'#6366f1'}}>✓</div>
                          <p style={{fontSize:13,color:'#9ca3af',margin:0}}>{obj.resposta}</p>
                        </div>
                      </div>
                      <button className="btn-small" style={{flexShrink:0,alignSelf:'flex-start', ...(copied === `obj-${i}` ? {borderColor:'#22c55e',color:'#22c55e'} : {})}}
                        onClick={() => copy(obj.resposta, `obj-${i}`)}>
                        {copied === `obj-${i}` ? '✓' : '⎘'}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === 'mensagem' && (
              <div className="card" style={{padding:20}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
                  <span style={{fontSize:13,fontWeight:600}}>Mensagem para enviar ao cliente</span>
                  <button className="btn-small" onClick={() => copy(DEMO.mensagem, 'mensagem')}
                    style={copied === 'mensagem' ? {borderColor:'#22c55e',color:'#22c55e'} : {}}>
                    {copied === 'mensagem' ? '✓ Copiado!' : '⎘ Copiar'}
                  </button>
                </div>
                <div style={{background:'rgba(255,255,255,0.03)',borderRadius:8,border:'1px solid #2a2a35',padding:'14px 16px'}}>
                  <pre style={{color:'#d1d5db'}}>{DEMO.mensagem}</pre>
                </div>
              </div>
            )}
          </div>
        );
      }

      // Form
      return (
        <div style={{maxWidth:580,margin:'0 auto',padding:'40px 16px'}}>
          <div style={{textAlign:'center',marginBottom:32}}>
            <div style={{width:56,height:56,background:'rgba(99,102,241,0.1)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:28}}>✨</div>
            <h1 style={{fontSize:24,fontWeight:700,margin:'0 0 8px'}}>Gerador de Propostas com IA</h1>
            <p style={{color:'#9ca3af',fontSize:14,margin:0,maxWidth:380,marginInline:'auto'}}>
              Preencha 3 campos e a IA gera escopo, investimento sugerido e proposta completa em segundos.
            </p>
          </div>

          <div className="card" style={{padding:24}}>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:6}}>O que você oferece? <span style={{color:'#ef4444'}}>*</span></label>
              <textarea className="input" rows={2} placeholder="Ex: Consultoria de marketing digital, Desenvolvimento de site..."
                value={servico} onChange={e => setServico(e.target.value)} />
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
              <div>
                <label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:6}}>Nome do cliente <span style={{color:'#ef4444'}}>*</span></label>
                <input className="input" placeholder="Ex: Empresa ABC" value={cliente} onChange={e => setCliente(e.target.value)} />
              </div>
              <div>
                <label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:6}}>Segmento <span style={{color:'#6b7280',fontWeight:400'}}>(opcional)</span></label>
                <input className="input" placeholder="Ex: Varejo, Saúde..." value={segmento} onChange={e => setSegmento(e.target.value)} />
              </div>
            </div>

            <div style={{marginBottom:20}}>
              <label style={{fontSize:13,fontWeight:500,display:'block',marginBottom:6}}>Contexto adicional <span style={{color:'#6b7280',fontWeight:400}}>(opcional)</span></label>
              <textarea className="input" rows={2} placeholder="Ex: Budget de R$ 5k, urgência para esse mês, principal dor é conversão..."
                value={contexto} onChange={e => setContexto(e.target.value)} />
            </div>

            <button className="btn-primary" disabled={!servico.trim() || !cliente.trim()} onClick={simularGeracao} style={{marginBottom:10}}>
              ✨ Gerar Proposta Completa →
            </button>

            <button className="btn-outline" onClick={showDemo}>
              Ver exemplo gerado pela IA
            </button>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:16}}>
              {[['📦','3 escopos com preço'],['⚡','Objeções + respostas'],['✉️','Mensagem de envio']].map(([icon,text]) => (
                <div key={text} className="tag" style={{justifyContent:'center',textAlign:'center',flexDirection:'column',gap:3}}>
                  <span style={{fontSize:18}}>{icon}</span>
                  <span>{text}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

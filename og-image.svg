<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040D1C"/>
      <stop offset="1" stop-color="#0A1A33"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4D7EFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7C5CFC" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- glow -->
  <circle cx="980" cy="120" r="260" fill="#4D7EFF" opacity="0.10"/>
  <circle cx="180" cy="560" r="220" fill="#7C5CFC" opacity="0.08"/>

  <!-- badge -->
  <rect x="90" y="120" width="300" height="44" rx="22" fill="#4D7EFF" opacity="0.14"/>
  <text x="115" y="149" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#7FA3FF" letter-spacing="2">EXCLUSIVO PARA CORRETORES</text>

  <!-- logo -->
  <text x="88" y="250" font-family="Inter,Arial,sans-serif" font-size="58" font-weight="800" letter-spacing="-2" fill="#EEF2FF">Corretor<tspan fill="#4D7EFF">PRO</tspan></text>

  <!-- headline -->
  <text x="90" y="350" font-family="Inter,Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="-2" fill="#FFFFFF">Proposta profissional</text>
  <text x="90" y="426" font-family="Inter,Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="-2" fill="#FFFFFF">em <tspan fill="#4D7EFF">60 segundos</tspan>, com sua marca.</text>

  <!-- subline -->
  <text x="92" y="486" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="500" fill="#9FB3D1">Sem Word. Sem PDF genérico. Direto do celular.</text>

  <!-- chips -->
  <g font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600">
    <rect x="90" y="528" width="230" height="52" rx="12" fill="url(#card)" stroke="#4D7EFF" stroke-opacity="0.3"/>
    <text x="115" y="561" fill="#C7D6EC">⚡ Em menos de 60s</text>
    <rect x="340" y="528" width="210" height="52" rx="12" fill="url(#card)" stroke="#4D7EFF" stroke-opacity="0.3"/>
    <text x="365" y="561" fill="#C7D6EC">🏷️ Sua marca</text>
    <rect x="570" y="528" width="240" height="52" rx="12" fill="url(#card)" stroke="#4D7EFF" stroke-opacity="0.3"/>
    <text x="595" y="561" fill="#C7D6EC">🛡️ 7 dias de garantia</text>
  </g>
</svg>

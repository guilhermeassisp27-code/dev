name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - claude/development-session-O10kI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create demo folder
        run: mkdir -p demo_output && cp demo/index.html demo_output/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./demo_output
          force_orphan: true

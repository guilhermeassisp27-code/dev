name: Deploy Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable GitHub Pages via API
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' || true

      - name: Prepare site
        run: |
          mkdir -p _site
          # Legal pages (required for Hotmart)
          cp termos.html _site/termos.html
          cp privacidade.html _site/privacidade.html
          # The authenticated tool
          cp tool.html _site/tool.html
          # Social share image (PNG exported from og-image.svg, if present)
          cp og-image.png _site/og-image.png 2>/dev/null || true
          cp og-image.svg _site/og-image.svg 2>/dev/null || true

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true

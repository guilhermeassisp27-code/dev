name: Evolução do Produto CorretorPRO

# Ciclo automático de evolução:
#   1) Agendado (a cada 2 semanas) o agente "produto" propõe e implementa UMA
#      melhoria, registra em docs/novidades.md e abre um PR para você revisar.
#   2) Quando uma melhoria entra no main (tool.html muda), o agente "marketing"
#      lê a novidade e gera Reels + post anunciando, abrindo um PR de conteúdo.
#
# PRÉ-REQUISITO: secret ANTHROPIC_API_KEY configurado em
#   Settings → Secrets and variables → Actions

on:
  schedule:
    # Quinzenal: dia 1 e 15 de cada mês, 09:00 BRT (12:00 UTC) — econômico.
    # OBS: não combinar dia-do-mês + dia-da-semana num mesmo cron; o padrão
    # cron trata como "OU" e dispararia muito mais vezes que o esperado.
    - cron: '0 12 1,15 * *'
  pull_request:
    # Quando um PR de melhoria (branch feat/*) é mergeado, dispara o anúncio.
    # A action do Claude não aceita evento 'push', por isso usamos pull_request.
    types: [closed]
  workflow_dispatch:
    inputs:
      acao:
        description: 'O que rodar manualmente'
        required: true
        type: choice
        options:
          - evoluir-produto
          - anunciar-novidade
        default: evoluir-produto

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  evoluir-produto:
    # Roda no agendamento de sexta OU no disparo manual "evoluir-produto"
    if: github.event_name == 'schedule' || github.event.inputs.acao == 'evoluir-produto'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rodar agente de produto
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(npx tsc:*)"
          prompt: |
            Use o agente "produto". PRIMEIRO pesquise na internet (WebSearch)
            dores reais de corretores de imóveis no Brasil — o que eles
            reclamam, o que pedem, onde perdem tempo/venda. Escolha UMA dor que
            faça sentido resolver na ferramenta (tool.html) e que seja
            AMBICIOSA (uma funcionalidade de verdade que diferencie o produto,
            não um ajuste cosmético) — mas sem quebrar o fluxo crítico.
            Implemente a versão mais enxuta que entrega esse valor. No PR e no
            topo de docs/novidades.md, documente: qual dor do corretor isso
            resolve e a fonte/evidência que você encontrou. Abra o PR (branch
            feat/*) e NÃO faça merge. Garanta que salvar→sair→entrar→persiste
            continua funcionando e rode `npx tsc --noEmit` se mexer em TS.

  anunciar-novidade:
    # Roda quando um PR de melhoria (branch feat/*) é mergeado OU no disparo manual.
    # O filtro feat/* evita disparar no merge dos próprios PRs de anúncio (evita loop).
    if: >-
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'feat/'))
      || github.event.inputs.acao == 'anunciar-novidade'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rodar agente de marketing (anúncio)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(npx tsc:*)"
          prompt: |
            Use o agente "marketing". Leia a entrada mais recente de
            docs/novidades.md (a novidade que acabou de entrar no ar). Crie o
            material para anunciá-la aos corretores: 1 roteiro de Reels/Shorts
            (gancho + demonstração + CTA) e 2 copies para feed/stories. Salve em
            marketing/anuncios/AAAA-MM-DD-<slug>.md e abra um PR. Atualize o
            Status da novidade em docs/novidades.md para "publicado".

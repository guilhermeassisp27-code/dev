<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040D1C"/>
      <stop offset="1" stop-color="#0A1A33"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <circle cx="500" cy="90" r="170" fill="#4D7EFF" opacity="0.12"/>
  <circle cx="90" cy="520" r="150" fill="#7C5CFC" opacity="0.10"/>

  <!-- badge -->
  <rect x="150" y="120" width="300" height="40" rx="20" fill="#4D7EFF" opacity="0.16"/>
  <text x="300" y="147" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700" fill="#7FA3FF" letter-spacing="2">PARA CORRETORES DE IMÓVEIS</text>

  <!-- logo -->
  <text x="300" y="270" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="58" font-weight="800" letter-spacing="-2" fill="#EEF2FF">Corretor<tspan fill="#4D7EFF">PRO</tspan></text>

  <!-- tagline -->
  <text x="300" y="330" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800" letter-spacing="-1" fill="#FFFFFF">Proposta profissional</text>
  <text x="300" y="372" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="800" letter-spacing="-1" fill="#FFFFFF">em <tspan fill="#4D7EFF">60 segundos</tspan></text>

  <!-- chips -->
  <g font-family="Inter,Arial,sans-serif" font-size="17" font-weight="600" text-anchor="middle">
    <rect x="120" y="430" width="170" height="46" rx="12" fill="#4D7EFF" fill-opacity="0.10" stroke="#4D7EFF" stroke-opacity="0.3"/>
    <text x="205" y="459" fill="#C7D6EC">Com a sua marca</text>
    <rect x="310" y="430" width="170" height="46" rx="12" fill="#4D7EFF" fill-opacity="0.10" stroke="#4D7EFF" stroke-opacity="0.3"/>
    <text x="395" y="459" fill="#C7D6EC">100% no celular</text>
  </g>
</svg>

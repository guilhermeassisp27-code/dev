<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04101F"/>
      <stop offset=".55" stop-color="#071629"/>
      <stop offset="1" stop-color="#0A1B33"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8BFF"/>
      <stop offset="1" stop-color="#3D6BF0"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EFF4FC"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="round"><rect x="206" y="150" width="188" height="250" rx="18"/></clipPath>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- ambient grid -->
  <g stroke="#9FB8E6" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 120 H600 M0 240 H600 M0 360 H600 M0 480 H600"/>
    <path d="M120 0 V600 M240 0 V600 M360 0 V600 M480 0 V600"/>
  </g>
  <circle cx="510" cy="80" r="190" fill="#4D7EFF" opacity="0.13"/>
  <circle cx="70" cy="540" r="170" fill="#7C5CFC" opacity="0.10"/>

  <!-- badge -->
  <g transform="translate(300,84)">
    <rect x="-168" y="-22" width="336" height="44" rx="22" fill="#5B8BFF" fill-opacity="0.12" stroke="#5B8BFF" stroke-opacity="0.30"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#A9C2FF" letter-spacing="3">PARA CORRETORES DE IMÓVEIS</text>
  </g>

  <!-- ===== phone mockup with proposal ===== -->
  <g filter="url(#soft)">
    <rect x="196" y="140" width="208" height="270" rx="30" fill="#0E1F3A" stroke="#33518A" stroke-opacity="0.6"/>
    <rect x="206" y="150" width="188" height="250" rx="18" fill="url(#sheet)"/>
  </g>
  <g clip-path="url(#round)">
    <!-- proposal header bar -->
    <rect x="206" y="150" width="188" height="56" fill="url(#brand)"/>
    <circle cx="230" cy="178" r="13" fill="#FFFFFF" fill-opacity="0.92"/>
    <path d="M224 178 l4 4 l8 -9" fill="none" stroke="#3D6BF0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="252" y="170" width="78" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.95"/>
    <rect x="252" y="183" width="52" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.6"/>

    <!-- property line -->
    <rect x="222" y="224" width="120" height="8" rx="4" fill="#1B2A44"/>
    <rect x="222" y="240" width="86" height="6" rx="3" fill="#9AAAC4"/>

    <!-- value highlight -->
    <rect x="222" y="262" width="156" height="40" rx="9" fill="#3D6BF0" fill-opacity="0.10"/>
    <rect x="234" y="272" width="46" height="6" rx="3" fill="#6E84A6"/>
    <rect x="234" y="284" width="92" height="10" rx="5" fill="#3D6BF0"/>

    <!-- payment rows -->
    <g>
      <rect x="222" y="318" width="156" height="20" rx="6" fill="#EEF3FB" stroke="#DDE6F4"/>
      <circle cx="234" cy="328" r="4" fill="#5B8BFF"/>
      <rect x="246" y="325" width="60" height="6" rx="3" fill="#8295B2"/>
      <rect x="338" y="325" width="30" height="6" rx="3" fill="#1B2A44"/>

      <rect x="222" y="344" width="156" height="20" rx="6" fill="#EEF3FB" stroke="#DDE6F4"/>
      <circle cx="234" cy="354" r="4" fill="#16A34A"/>
      <rect x="246" y="351" width="72" height="6" rx="3" fill="#8295B2"/>
      <rect x="338" y="351" width="30" height="6" rx="3" fill="#1B2A44"/>

      <rect x="222" y="370" width="156" height="20" rx="6" fill="#EEF3FB" stroke="#DDE6F4"/>
      <circle cx="234" cy="380" r="4" fill="#7C5CFC"/>
      <rect x="246" y="377" width="50" height="6" rx="3" fill="#8295B2"/>
      <rect x="338" y="377" width="30" height="6" rx="3" fill="#1B2A44"/>
    </g>
  </g>

  <!-- floating "60s" timer chip -->
  <g transform="translate(398,178)">
    <circle cx="0" cy="0" r="34" fill="#0E1F3A" stroke="#5B8BFF" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="34" fill="#5B8BFF" fill-opacity="0.10"/>
    <path d="M0 -22 A22 22 0 1 1 -15.5 -15.5" fill="none" stroke="#5B8BFF" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#EAF0FF">60s</text>
  </g>

  <!-- logo (split into two anchored texts to avoid tspan centering bug) -->
  <text x="358" y="468" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="50" font-weight="800" letter-spacing="-2" fill="#EEF2FF">Corretor</text>
  <text x="360" y="468" text-anchor="start" font-family="Inter,Arial,sans-serif" font-size="50" font-weight="800" letter-spacing="-2" fill="#5B8BFF">PRO</text>

  <!-- tagline -->
  <text x="300" y="508" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="700" letter-spacing="-.5" fill="#C7D6EC">Propostas com a sua marca em segundos</text>

  <!-- chips with svg icons -->
  <g font-family="Inter,Arial,sans-serif" font-size="15" font-weight="600">
    <!-- chip 1 -->
    <rect x="130" y="534" width="158" height="40" rx="12" fill="#5B8BFF" fill-opacity="0.08" stroke="#5B8BFF" stroke-opacity="0.28"/>
    <path d="M150 554 l4 4 l8 -9" fill="none" stroke="#5B8BFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="170" y="559" font-family="Inter,Arial,sans-serif" fill="#C7D6EC">Logo e cor</text>
    <!-- chip 2 -->
    <rect x="312" y="534" width="158" height="40" rx="12" fill="#5B8BFF" fill-opacity="0.08" stroke="#5B8BFF" stroke-opacity="0.28"/>
    <rect x="330" y="546" width="13" height="20" rx="3" fill="none" stroke="#5B8BFF" stroke-width="2.2"/>
    <line x1="334" y1="562" x2="339" y2="562" stroke="#5B8BFF" stroke-width="2.2" stroke-linecap="round"/>
    <text x="352" y="559" font-family="Inter,Arial,sans-serif" fill="#C7D6EC">No celular</text>
  </g>
</svg>

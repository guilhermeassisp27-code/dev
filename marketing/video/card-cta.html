<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  body { width:1080px; height:1920px; overflow:hidden;
         font-family:'Inter','Segoe UI',Arial,sans-serif;
         background:radial-gradient(ellipse at 50% 30%, #122443 0%, #0A1628 65%);
         display:flex; align-items:center; justify-content:center }
  .wrap { text-align:center; width:920px }
  .logo { font-size:72px; font-weight:800; letter-spacing:-2px; color:#EEF2FF;
          opacity:0; animation:fade .5s ease-out .2s forwards }
  .logo b { color:#4D7EFF }
  .t1 { margin-top:90px; font-size:88px; font-weight:900; color:#fff; line-height:1.15;
        opacity:0; transform:translateY(30px); animation:up .5s ease-out .9s forwards }
  .t2 { margin-top:28px; font-size:88px; font-weight:900; line-height:1.15;
        background:linear-gradient(90deg,#4D7EFF,#7BA3FF); -webkit-background-clip:text;
        background-clip:text; color:transparent;
        opacity:0; transform:translateY(30px); animation:up .5s ease-out 1.6s forwards }
  .preco { margin-top:100px; font-size:54px; font-weight:700; color:#EEF2FF;
           opacity:0; animation:fade .5s ease-out 2.6s forwards }
  .preco small { display:block; font-size:38px; font-weight:600; color:#7B93B8; margin-top:18px }
  .btn { margin-top:80px; display:inline-block; background:#4D7EFF; color:#fff;
         font-size:50px; font-weight:800; padding:42px 90px; border-radius:22px;
         box-shadow:0 20px 60px rgba(77,126,255,.45);
         opacity:0; transform:scale(.9);
         animation:pop .4s cubic-bezier(.2,1.4,.4,1) 3.4s forwards,
                   pulse 1.4s ease-in-out 4s infinite }
  .url { margin-top:60px; font-size:40px; font-weight:600; color:#7B93B8;
         opacity:0; animation:fade .5s ease-out 4s forwards }
  .seta { margin-top:70px; font-size:90px; opacity:0;
          animation:fade .4s ease-out 4.4s forwards, bounce 1s ease-in-out 4.6s infinite }
  @keyframes up    { to { opacity:1; transform:translateY(0) } }
  @keyframes fade  { to { opacity:1 } }
  @keyframes pop   { to { opacity:1; transform:scale(1) } }
  @keyframes pulse { 50% { transform:scale(1.045) } }
  @keyframes bounce{ 50% { transform:translateY(22px) } }
</style></head>
<body>
  <div class="wrap">
    <div class="logo">Corretor<b>PRO</b></div>
    <div class="t1">Proteja sua comissão.</div>
    <div class="t2">Feche mais vendas.</div>
    <div class="preco">R$ 67/mês<small>7 dias de garantia — se não servir, devolvemos tudo</small></div>
    <div class="btn">Quero testar sem risco</div>
    <div class="url">usecorretorpro.vercel.app</div>
    <div class="seta">👇</div>
  </div>
</body></html>

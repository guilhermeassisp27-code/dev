<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  body { width:1080px; height:1920px; background:#fff; overflow:hidden;
         font-family:'Inter','Segoe UI',Arial,sans-serif;
         display:flex; align-items:center; justify-content:center }
  .wrap { width:880px; text-align:center }
  .l1 { font-size:64px; font-weight:700; color:#0A1628; line-height:1.25;
        opacity:0; transform:translateY(30px);
        animation:up .5s ease-out .4s forwards }
  .l2 { margin-top:56px; font-size:96px; font-weight:900; color:#E53E3E;
        line-height:1.12; letter-spacing:-1px; text-transform:uppercase;
        opacity:0; transform:scale(.85);
        animation:pop .35s cubic-bezier(.2,1.4,.4,1) 1.35s forwards }
  .l3 { margin-top:64px; font-size:52px; font-weight:700; color:#64748B;
        opacity:0; animation:fade .4s ease-out 2.5s forwards }
  @keyframes up   { to { opacity:1; transform:translateY(0) } }
  @keyframes pop  { to { opacity:1; transform:scale(1) } }
  @keyframes fade { to { opacity:1 } }
</style></head>
<body>
  <div class="wrap">
    <div class="l1">O cliente visitou o imóvel<br>com você.</div>
    <div class="l2">Fechou direto<br>com o dono.</div>
    <div class="l3">E agora?</div>
  </div>
</body></html>
